version: '3.8'

services:
  backend:
    build: ./backend
    container_name: paisafy-backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/paisafy
    depends_on:
      - mongodb
    networks:
      - paisafy-network

  frontend:
    build: ./frontend
    container_name: paisafy-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - paisafy-network

  ai-service:
    build: ./ai-service
    container_name: paisafy-ai-service
    ports:
      - "8000:8000"
    networks:
      - paisafy-network

  mongodb:
    image: mongo:latest
    container_name: paisafy-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - paisafy-network

  redis:
    image: redis:alpine
    container_name: paisafy-redis
    ports:
      - "6379:6379"
    networks:
      - paisafy-network

networks:
  paisafy-network:
    driver: bridge

volumes:
  mongodb-data:
